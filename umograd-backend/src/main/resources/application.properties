spring.application.name=umograd-backend
server.port=8080
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/umograd?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=root
spring.datasource.password=root
spring.flyway.baseline-on-migrate=true

upload.path=D:/Университет/Диплом/umograd-backend/src/main/resources/img/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.error.include-message=always

spring.web.resources.static-locations=classpath:/static/

spring.jpa.show-sql=false

jwt.secret=mysupersecretkeymysupersecretkey

integration.analytic-service.url=${ANALYTIC_SERVICE_INTERNAL_URL:http://localhost:8182}
